<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulacro A1</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1><span>S</span>IMULACRO <span>A</span>1</h1>

<div id="top-bar">
  <span id="progress-text">Pregunta 1/40</span>
  <span id="timer">40:00</span>
</div>

<div id="progress-bar">
  <div id="progress-fill"></div>
</div>

<div id="quiz">
  <h2 id="question"></h2>

  <img id="image" src="">

  <div id="options"></div>

  <p id="counter"></p>

  <div id="nav-buttons">
  <button id="prevBtn" type="button" onclick="prev()">◀ Anterior</button>
  <button id="nextBtn" type="button" onclick="next()">Siguiente ▶</button>
</div>
</div>

<div id="result" style="display:none;"></div>

<div id="resultOverlay" class="overlay hidden">
  <div class="overlay-content">
    <h1 id="overlayText"></h1>
    <p>Haz clic para ver tus respuestas</p>
  </div>
</div>

<!-- 🔥 ORDEN CORRECTO -->
<script src="../data/questions.js"></script>
<script src="app.js"></script>

</body>
</html>
